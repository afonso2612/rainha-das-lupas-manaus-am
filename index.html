<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rainha das Lupas</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    :root {
      --gold: #c8a45d;
      --gold-strong: #b78d3d;
      --dark: #111111;
      --light: #f8f6f2;
      --white: #ffffff;
      --gray: #6b7280;
      --line: #e9e3d8;
      --shadow: 0 10px 30px rgba(0,0,0,0.10);
      --shadow-hover: 0 18px 40px rgba(0,0,0,0.16);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--light);
      color: var(--dark);
    }

    a {
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1180px, 92%);
      margin: 0 auto;
    }

    .topbar {
      background: var(--dark);
      color: #f3efe8;
      font-size: 14px;
      padding: 10px 0;
      text-align: center;
      letter-spacing: 0.4px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(248, 246, 242, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .nav {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 58px;
      height: 58px;
      object-fit: cover;
      border-radius: 16px;
      border: 2px solid var(--gold);
      background: #fff;
      padding: 4px;
    }

    .brand-text h1 {
      font-size: 24px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .brand-text p {
      font-size: 13px;
      color: var(--gray);
      letter-spacing: 0.6px;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-links a {
      color: var(--dark);
      font-weight: bold;
      font-size: 15px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: var(--gold-strong);
    }

    .btn-whats {
      background: #25d366;
      color: white;
      padding: 13px 22px;
      border-radius: 999px;
      font-weight: bold;
      box-shadow: var(--shadow);
      transition: 0.3s;
      display: inline-block;
    }

    .btn-whats:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .hero {
      padding: 72px 0 46px;
      background:
        radial-gradient(circle at top right, rgba(200,164,93,0.18), transparent 28%),
        radial-gradient(circle at left center, rgba(200,164,93,0.10), transparent 20%),
        linear-gradient(180deg, #fbfaf7 0%, #f6f1e8 100%);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 34px;
      align-items: center;
    }

    .badge {
      display: inline-block;
      background: rgba(200,164,93,0.14);
      color: #8b6a2a;
      border: 1px solid rgba(200,164,93,0.32);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    .hero h2 {
      font-size: 56px;
      line-height: 1.05;
      margin-bottom: 18px;
      max-width: 700px;
    }

    .hero p {
      font-size: 18px;
      color: #4b5563;
      line-height: 1.7;
      max-width: 640px;
      margin-bottom: 28px;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

      background: var(--dark
